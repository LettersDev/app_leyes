name: Gacetas Sync Bot

on:
  schedule:
    # Cada día a la 1:00 PM UTC = 9:00 AM Venezuela (VET, UTC-4)
    # Escanea los últimos 15 días → detecta nuevas gacetas en menos de 24h
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode: weekly (default, 15d+notify), daily (hoy+ayer+notify), smart (4 semanas), full (2020→hoy), o un año como 2024'
        required: false
        default: 'weekly'

jobs:
  sync_gacetas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios @supabase/supabase-js cheerio dotenv

      - name: Run Gacetas Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'weekly' }}"
          if echo "$MODE" | grep -qE '^[0-9]{4}$'; then
            echo "Running for year: $MODE"
            node scripts/getGacetas.js --year=$MODE
          else
            echo "Running mode: $MODE"
            node scripts/getGacetas.js --mode=$MODE
          fi
