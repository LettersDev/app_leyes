name: Gacetas Sync Bot

on:
  schedule:
    # Cada 2 días a la 1:00 PM UTC = 9:00 AM Venezuela (VET, UTC-4)
    # Escanea todo el año actual para asegurar que no falte nada
    - cron: '0 13 */2 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode: auto (default, from last gaceta), year (current year), weekly (15d), full (2020→hoy)'
        required: false
        default: 'auto'

jobs:
  sync_gacetas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install axios @supabase/supabase-js cheerio dotenv

      - name: Run Gacetas Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'year' }}"
          if [ "$MODE" = "year" ]; then
            CURRENT_YEAR=$(date +%Y)
            echo "Running for current year: $CURRENT_YEAR"
            node scripts/getGacetas.js --year=$CURRENT_YEAR
          elif echo "$MODE" | grep -qE '^[0-9]{4}$'; then
            echo "Running for year: $MODE"
            node scripts/getGacetas.js --year=$MODE
          else
            echo "Running mode: $MODE"
            node scripts/getGacetas.js --mode=$MODE
          fi
