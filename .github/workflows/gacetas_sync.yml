name: Gacetas Sync Bot

on:
  schedule:
    - cron: '0 21 * * *' # 5:00 PM Venezuela (VET)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode: daily (default), smart (4 weeks), full (2020→hoy), or a year like 2024'
        required: false
        default: 'daily'

jobs:
  sync_gacetas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install axios @supabase/supabase-js cheerio dotenv

      - name: Run Gacetas Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'daily' }}"
          if echo "$MODE" | grep -qE '^[0-9]{4}$'; then
            echo "Running for year: $MODE"
            node scripts/getGacetas.js --year=$MODE
          else
            echo "Running mode: $MODE"
            node scripts/getGacetas.js --mode=$MODE
          fi
